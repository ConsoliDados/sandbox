name: CI

# Pipeline split by branch target (see docs/sandbox/release-process.md):
#
#   - Cheap jobs (lint, test ubuntu, msrv) run on every PR/push to dev and main.
#     ~2 min total with cache — basically free safety net on every change.
#
#   - Heavy jobs (test macos, test-docker) run only on the release path:
#     PRs to main (= release/* and hotfix/* per branch protection) and
#     pushes to main (post-merge revalidation, defense in depth).
#
# Rationale: dev is the integration WIP branch; running mac + docker-tests
# on every feat/* PR is overkill. The release branch is the real quality gate.
#
# macOS billing note (2026-05): this repo is public → macos-latest minutes are
# free. If that changes (private fork, GitHub policy shift), the macOS job can
# be temporarily disabled and replaced with a self-hosted docker-osx runner
# (https://github.com/sickcodes/docker-osx).

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # ─── Cheap jobs (always) ──────────────────────────────────────────────────

  lint:
    name: lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # Mirrors scripts/dev/lint.sh; called directly so we don't need zsh on the runner.
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Mirrors scripts/dev/test.sh (no docker-tests feature — that's the test-docker job).
      - name: cargo test
        run: cargo test --workspace

  msrv:
    name: msrv (1.91)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Guards the `rust-version = "1.91"` claim in workspace Cargo.toml.
      # Floor set by transitive deps (yara-x → wasmtime → cranelift) requiring 1.91.
      - uses: dtolnay/rust-toolchain@1.91
      - uses: Swatinem/rust-cache@v2
      - name: cargo check
        run: cargo check --workspace --all-targets

  # ─── Heavy jobs (release path only) ───────────────────────────────────────

  test-macos:
    name: test (macos-latest)
    runs-on: macos-latest
    # Informational until the platform stabilizes — we don't want a transient
    # mac issue to block a release. Promote to required by removing this line
    # and adding the job to branch protection.
    continue-on-error: true
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.base_ref == 'main')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --workspace

  test-docker:
    name: test (docker-tests)
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.base_ref == 'main')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify Docker daemon
        run: docker version
      # Pre-pull so the first lifecycle test doesn't race on the registry.
      - name: Pre-pull base image
        run: docker pull node:24.10.0
      - name: cargo test --features docker-tests
        run: cargo test -p sandbox-cli --features docker-tests
